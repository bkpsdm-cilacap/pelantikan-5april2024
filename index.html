<!DOCTYPE html>
<html lang="id">
<head>
  <title>File Petikan, BA, dan SPP Pelantikan 5 April 2024 | BKPSDM Cilacap</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* RESET */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    /* IFRAME FULL SCREEN */
    iframe {
      position: fixed;
      inset: 0;               /* top:0 right:0 bottom:0 left:0 */
      width: 100vw;
      height: 100vh;
      border: none;
    }
  </style>
</head>

<body>

  <iframe
    id="timerFrame"
    src="https://script.google.com/macros/s/AKfycbz9AxQWnF49xYWnJKQMO94QouSjle164Ce9M4LSNXVhsh3Bu2g_mnEZOE7KbP05Tb5F/exec"
    allowfullscreen
    loading="eager">
  </iframe>

  <script>
    // Fullscreen hanya bisa dipicu oleh interaksi user (aturan browser)
    document.addEventListener('click', () => {
      const iframe = document.getElementById('timerFrame');
      if (iframe.requestFullscreen) {
        iframe.requestFullscreen();
      }
    });
  </script>

</body>
</html>
